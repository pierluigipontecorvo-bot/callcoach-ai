{% extends "base.html" %}
{% set active_page = "appointments" %}

{% block title %}Appuntamenti — CallCoach Admin{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h4 class="fw-bold mb-0">Appuntamenti da analizzare</h4>
    <p class="text-muted small mb-0" id="appt-subtitle">&nbsp;</p>
  </div>
  <button id="appt-refresh" onclick="loadAppts(true)"
          class="btn btn-sm btn-outline-secondary" style="display:none; font-size:12px;">
    ↺ Aggiorna
  </button>
</div>

<div id="appt-container">
  <div class="text-center py-5 text-muted">
    <div class="spinner-border" role="status"
         style="width:1.5rem; height:1.5rem; border-width:2px; color:var(--ec-slate);"></div>
    <p class="mt-2 small mb-0">Caricamento appuntamenti Acuity…</p>
  </div>
</div>

{% endblock %}

{% block scripts %}
<style>
  th.sortable { cursor:pointer; user-select:none; white-space:nowrap; }
  th.sortable:hover { color:var(--ec-navy); }
  th.sortable .sort-icon {
    display:inline-block; width:12px; font-size:9px;
    opacity:.35; margin-left:3px; vertical-align:middle;
  }
  th.sortable.asc  .sort-icon,
  th.sortable.desc .sort-icon { opacity:1; }
</style>

<script>
(function () {
  var _LS_COL  = 'appt_sort_col';
  var _LS_DIR  = 'appt_sort_dir';
  var _lastCol = -1;
  var _ascending = true;
  var _reloadTimer = null;

  /* ── Date parser: "dd/mm/yyyy HH:MM" or "dd/mm/yy" → timestamp ── */
  function parseDate(str) {
    if (!str || str === '—') return 0;
    // "dd/mm/yyyy HH:MM"
    var m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{2}):(\d{2})/);
    if (m) return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5]).getTime();
    // "dd/mm/yy"
    var m2 = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
    if (m2) return new Date(2000 + +m2[3], +m2[2]-1, +m2[1]).getTime();
    return 0;
  }

  /* ── Sort logic ── */
  function applySort(col, ascending) {
    var table = document.getElementById('apptTable');
    if (!table) return;
    var tbody = table.querySelector('tbody');
    var rows  = Array.from(tbody.querySelectorAll('tr'));
    var th    = table.querySelector('th.sortable[data-col="' + col + '"]');
    if (!th) return;
    var type  = th.dataset.type || 'text';

    _lastCol   = col;
    _ascending = ascending;

    table.querySelectorAll('th.sortable').forEach(function (h) {
      h.classList.remove('asc', 'desc');
      h.querySelector('.sort-icon').textContent = '⇅';
    });
    th.classList.add(ascending ? 'asc' : 'desc');
    th.querySelector('.sort-icon').textContent = ascending ? '▲' : '▼';

    rows.sort(function (rowA, rowB) {
      var cellA = rowA.cells[col], cellB = rowB.cells[col];
      var valA = (cellA && cellA.dataset.val !== undefined
        ? cellA.dataset.val : (cellA ? cellA.textContent : '')).trim();
      var valB = (cellB && cellB.dataset.val !== undefined
        ? cellB.dataset.val : (cellB ? cellB.textContent : '')).trim();
      var cmp = (type === 'date')
        ? parseDate(valA) - parseDate(valB)
        : valA.localeCompare(valB, 'it', { sensitivity: 'base' });
      return ascending ? cmp : -cmp;
    });
    rows.forEach(function (r) { tbody.appendChild(r); });
  }

  function initSort() {
    document.querySelectorAll('#apptTable th.sortable').forEach(function (th) {
      th.addEventListener('click', function () {
        var col = parseInt(th.dataset.col, 10);
        var asc = (_lastCol === col) ? !_ascending : true;
        applySort(col, asc);
        try {
          localStorage.setItem(_LS_COL, col);
          localStorage.setItem(_LS_DIR, asc ? 'asc' : 'desc');
        } catch (e) {}
      });
    });
    try {
      var savedCol = localStorage.getItem(_LS_COL);
      var savedDir = localStorage.getItem(_LS_DIR);
      if (savedCol !== null) {
        applySort(parseInt(savedCol, 10), savedDir !== 'desc');
      }
    } catch (e) {}
  }

  /* ── Spinner HTML ── */
  function spinnerHtml() {
    return '<div class="text-center py-5 text-muted">' +
      '<div class="spinner-border" role="status" ' +
      'style="width:1.5rem;height:1.5rem;border-width:2px;color:var(--ec-slate);"></div>' +
      '<p class="mt-2 small mb-0">Caricamento appuntamenti Acuity\u2026</p></div>';
  }

  /* ── Main loader ── */
  /* silent=true → no spinner, no scroll reset (background auto-poll) */
  window.loadAppts = function (forceRefresh, silent) {
    if (_reloadTimer) { clearTimeout(_reloadTimer); _reloadTimer = null; }
    document.getElementById('appt-refresh').style.display = 'none';

    if (!silent) {
      document.getElementById('appt-container').innerHTML = spinnerHtml();
    }

    var url = '/admin/ui/appointments/data' + (forceRefresh ? '?refresh=1' : '');
    fetch(url, { credentials: 'same-origin' })
      .then(function (r) {
        if (r.status === 401) { window.location = '/admin/ui/login'; return null; }
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function (html) {
        if (html === null) return;
        var container = document.getElementById('appt-container');

        /* silent update: remember scroll, replace, restore */
        var scrollY = silent ? window.scrollY : 0;
        container.innerHTML = html;
        if (silent && scrollY) window.scrollTo(0, scrollY);

        /* update subtitle */
        var wrapper = document.getElementById('appt-data');
        if (wrapper) {
          var sub = wrapper.getAttribute('data-subtitle');
          if (sub) document.getElementById('appt-subtitle').textContent = sub;

          /* start lightweight cell-only poll if any analysis is in progress */
          if (wrapper.getAttribute('data-auto-reload') === 'true') {
            _reloadTimer = setTimeout(pollStatuses, 3000);
          }
        }

        initSort();
        document.getElementById('appt-refresh').style.display = '';
      })
      .catch(function (err) {
        if (!silent) {
          document.getElementById('appt-container').innerHTML =
            '<div class="alert alert-danger">Errore nel caricamento dati (' + err + '). ' +
            '<a href="#" onclick="loadAppts(true);return false;">Riprova</a></div>';
        }
        document.getElementById('appt-refresh').style.display = '';
      });
  };

  /* ── Lightweight status poll — updates ONLY Analisi cells, zero table flicker ── */
  function renderStatusCell(item) {
    if (item.status === 'processing' || item.status === 'pending') {
      return '<div style="font-size:10px;color:#888;">' +
        (item.step_message || 'In corso...') + ' ' + item.progress + '%</div>' +
        '<div class="progress" style="height:5px;margin-top:2px;">' +
        '<div class="progress-bar progress-bar-striped progress-bar-animated bg-warning" ' +
        'style="width:' + item.progress + '%"></div></div>';
    }
    if (item.qualification_level === 'errore_tecnico' || item.status === 'error') {
      return '<a href="/admin/ui/analyses/' + item.analysis_id + '" ' +
        'class="badge text-decoration-none" style="font-size:11px;background:#e65100;">' +
        '\u26a0\ufe0f Errore tecnico</a>';
    }
    if (item.status === 'completed') {
      return '<a href="/admin/ui/analyses/' + item.analysis_id + '" ' +
        'class="badge bg-success text-decoration-none" style="font-size:11px;">' +
        '\u2713 Completata</a>';
    }
    return null;
  }

  function pollStatuses() {
    if (_reloadTimer) { clearTimeout(_reloadTimer); _reloadTimer = null; }
    fetch('/admin/ui/appointments/status-poll', { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        data.items.forEach(function (item) {
          var row = document.querySelector('tr[data-appt-id="' + item.appt_id + '"]');
          if (!row) return;
          var cell = row.querySelector('td[data-poll-cell]');
          if (!cell) return;
          var html = renderStatusCell(item);
          if (html) cell.innerHTML = html;
        });
        /* continua a fare poll SOLO se ci sono analisi ancora in corso */
        if (data.has_processing) {
          _reloadTimer = setTimeout(pollStatuses, 3000);
        }
        /* quando tutto finito: nessun reload — la tabella rimane ferma */
      })
      .catch(function () {
        /* errore di rete: riprova dopo 10s senza ricaricare la tabella */
        _reloadTimer = setTimeout(pollStatuses, 10000);
      });
  }

  document.addEventListener('DOMContentLoaded', function () { window.loadAppts(false); });
})();
</script>
{% endblock %}
