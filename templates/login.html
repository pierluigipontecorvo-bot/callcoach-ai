<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — CallCoach Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8f9fa; }
    .login-card { max-width: 380px; margin: 100px auto; }
  </style>
</head>
<body>
<div class="login-card card shadow-sm p-4">
  <div class="text-center mb-4">
    <div style="font-size:2.5rem">🎙</div>
    <h4 class="fw-bold mt-1 mb-0">CallCoach Admin</h4>
    <p class="text-muted small">Effoncall</p>
  </div>

  {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
  {% endif %}

  <form method="post">
    <div class="mb-3">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" autofocus required>
    </div>
    <button type="submit" class="btn btn-dark w-100">Accedi</button>
  </form>
</div>
</body>
</html>
