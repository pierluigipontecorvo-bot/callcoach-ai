<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accedi — CallCoach Admin</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <style>
    :root {
      --ec-navy:  #001126;
      --ec-slate: #708090;
      --ec-grey:  #d3d2d2;
    }
    * { font-family: 'Poppins', sans-serif; }
    h1, h2, h3, h4, h5, .label-ui {
      font-family: 'Space Grotesk', sans-serif;
    }

    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      background: var(--ec-navy);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Subtle grid texture on the dark background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(112,128,144,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(112,128,144,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 0 1rem;
      position: relative;
      z-index: 1;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo img {
      height: 42px;
      width: auto;
    }

    .login-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 2rem 2rem 1.75rem;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
    }

    .login-card h5 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ec-navy);
      margin-bottom: .25rem;
    }
    .login-card .subtitle {
      font-size: 12px;
      color: var(--ec-slate);
      margin-bottom: 1.5rem;
    }

    .form-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .4px;
      text-transform: uppercase;
      color: var(--ec-slate);
      margin-bottom: .3rem;
    }
    .form-control {
      border-color: #dde1e9;
      border-radius: 8px;
      font-size: 14px;
      padding: .6rem .85rem;
    }
    .form-control:focus {
      border-color: var(--ec-slate);
      box-shadow: 0 0 0 .2rem rgba(112,128,144,.2);
    }

    .btn-login {
      background: var(--ec-navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      width: 100%;
      padding: .65rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .3px;
      margin-top: .5rem;
      transition: background .2s;
    }
    .btn-login:hover {
      background: #002244;
      color: #fff;
    }

    .login-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 11px;
      color: rgba(255,255,255,.3);
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <!-- Logo -->
  <div class="login-logo">
    <img src="/static/logo_dark.png" alt="Effoncall">
  </div>

  <!-- Card -->
  <div class="login-card">
    <h5>Accedi</h5>
    <p class="subtitle">Area riservata — CallCoach Admin</p>

    {% if error %}
      <div class="alert alert-danger py-2 mb-3" style="font-size:13px; border-radius:8px;">
        {{ error }}
      </div>
    {% endif %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" autofocus required
               placeholder="••••••••">
      </div>
      <button type="submit" class="btn-login">Accedi</button>
    </form>
  </div>

  <div class="login-footer">Effoncall © 2026 — uso interno</div>
</div>

</body>
</html>
